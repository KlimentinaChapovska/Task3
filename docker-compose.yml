version: "3.9"

# ---------------------------------------------------------------------------
# VPS deployment — three containers:
#   nginx     → public-facing reverse proxy (port 80)
#   frontend  → React production build served by Nginx
#   backend   → FastAPI served by Uvicorn
# ---------------------------------------------------------------------------

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    # Not exposed to the host — only reachable through the nginx service

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # In production, restrict to your actual frontend domain, e.g.:
      # ALLOWED_ORIGINS: "https://yourdomain.com"
      ALLOWED_ORIGINS: "http://localhost,http://YOUR_DOMAIN"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
