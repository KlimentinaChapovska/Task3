# Nginx reverse-proxy config for VPS deployment.
# Replace YOUR_DOMAIN with your actual domain name (or server IP for testing).
#
# To add HTTPS later: run Certbot against this config.
# certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Forward /api/* to the FastAPI backend container
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Serve the React frontend
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host $host;
        # React Router support is handled inside the frontend container
    }
}
